name: Debug Issue Form Inputs

on:
  issues:
    types: [opened]

jobs:
  debug:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Parse Issue Form
        id: parse
        uses: stefanbuck/github-issue-parser@v3
        with:
          template-path: .github/ISSUE_TEMPLATE/debug_inputs.yml

      - name: Print raw issue body
        run: |
          echo "===== RAW ISSUE BODY ====="
          echo "${{ github.event.issue.body }}"

      - name: Print parsed outputs
        run: |
          echo "===== PARSED OUTPUTS ====="
          echo "environment: '${{ steps.parse.outputs.issueparser_environment }}'"
          echo "update_pages_for: '${{ steps.parse.outputs.issueparser_update_pages_for }}'"
          echo "course_ids: '${{ steps.parse.outputs.issueparser_course_ids }}'"
          echo "module_rollup: '${{ steps.parse.outputs.issueparser_module_rollup }}'"
          echo "prod_confirmation: '${{ steps.parse.outputs.issueparser_prod_confirmation }}'"

      - name: Check checkbox state
        run: |
          MODULE_ROLLUP="${{ steps.parse.outputs.issueparser_module_rollup }}"
          PROD_CONFIRMATION="${{ steps.parse.outputs.issueparser_prod_confirmation }}"

          echo "===== CHECKBOX STATE ====="

          # Module Roll-Up checkbox
          if [ "$MODULE_ROLLUP" = "true" ] || [ "$MODULE_ROLLUP" = "on" ]; then
            echo "Module Roll-Up checkbox: CHECKED"
          else
            echo "Module Roll-Up checkbox: UNCHECKED"
          fi

          # Production confirmation checkbox
          if [ "$PROD_CONFIRMATION" = "true" ] || [ "$PROD_CONFIRMATION" = "on" ]; then
            echo "Production Confirmation checkbox: CHECKED"
          else
            echo "Production Confirmation checkbox: UNCHECKED"
          fi
