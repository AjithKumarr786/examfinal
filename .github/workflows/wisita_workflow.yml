name: Test Issue Form Values

on:
  issues:
    types: [labeled]

jobs:
  print-values:
    runs-on: ubuntu-latest

    # Only run when the specific label is added
    if: contains(github.event.issue.labels.*.name, 'update-wistia-page-titles')

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Parse Issue Form Body
        id: parse
        uses: stefanbuck/github-issue-parser@v3
        with:
          template-path: .github/ISSUE_TEMPLATE/issue-ops-update-wistia-page-titles.yml

      - name: Print parsed issue form values
        run: |
          echo "===== Parsed Issue Form Values ====="
          echo "Course IDs: ${{ steps.parse.outputs.issueparser_course_ids }}"
          echo "Update Pages For: ${{ steps.parse.outputs.issueparser_update_pages_for }}"
          echo "Environment: ${{ steps.parse.outputs.issueparser_environment }}"
          echo "Module Rollup: ${{ steps.parse.outputs.issueparser_module_rollup }}"
          echo "===================================="
