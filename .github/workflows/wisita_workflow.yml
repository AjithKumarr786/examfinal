name: Test Issue Form Values

on:
  issues:
    types: [labeled]

jobs:
  print-values:
    runs-on: ubuntu-latest

    # Run only when this label is added
    if: contains(github.event.issue.labels.*.name, 'update-wistia-page-titles')

    steps:
      - name: Print raw issue body
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          echo "===== RAW ISSUE BODY ====="
          echo "$ISSUE_BODY"
          echo "=========================="

      - name: Extract form values
        id: extract
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          # 1. Parse the first non-empty line following each section heading
          ENVIRONMENT=$(echo "$ISSUE_BODY" | awk '/### Environment/{flag=1; next} flag && NF {print; exit}')
          SCOPE=$(echo "$ISSUE_BODY" | awk '/### Scope/{flag=1; next} flag && NF {print; exit}')
          COURSE_IDS=$(echo "$ISSUE_BODY" | awk '/### Program ID or Course ID\(s\)/{flag=1; next} flag && NF {print; exit}')

          # 2. Check if the checkbox is actively checked ([x])
          if echo "$ISSUE_BODY" | grep -Eq '\[x\].*Update Modules'; then
            MODULE_ROLLUP="true"
          else
            MODULE_ROLLUP="false"
          fi

          # 3. Save variables to GITHUB_OUTPUT
          echo "environment=$ENVIRONMENT" >> $GITHUB_OUTPUT
          echo "scope=$SCOPE" >> $GITHUB_OUTPUT
          echo "course_ids=$COURSE_IDS" >> $GITHUB_OUTPUT
          echo "module_rollup=$MODULE_ROLLUP" >> $GITHUB_OUTPUT

      - name: Print extracted values
        run: |
          echo "===== EXTRACTED VALUES ====="
          echo "Environment: ${{ steps.extract.outputs.environment }}"
          echo "Scope: ${{ steps.extract.outputs.scope }}"
          echo "Course IDs: ${{ steps.extract.outputs.course_ids }}"
          echo "Module Rollup: ${{ steps.extract.outputs.module_rollup }}"
          echo "============================"
